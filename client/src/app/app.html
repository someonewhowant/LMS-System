<div class="app-layout">
  <mat-toolbar class="app-navbar glassmorphism">
    <div class="brand" routerLink="/">
      <mat-icon class="brand-icon">school</mat-icon>
      <span class="brand-text">LMS Platform</span>
    </div>
    
    <div class="nav-links">
      <a routerLink="/blog" routerLinkActive="active-link" class="nav-item">
        <mat-icon>feed</mat-icon> Блог & Новости
      </a>
    </div>

    <div class="spacer"></div>

    <div class="auth-section">
      @if (authService.currentUser(); as user) {
        <div class="user-info">
          <span class="user-welcome">Привет, <strong>{{ user.name || user.email }}</strong></span>
          <span class="user-role {{ user.role.toLowerCase() }}">{{ user.role }}</span>
        </div>
        <button mat-flat-button color="warn" class="logout-btn" (click)="authService.logout()">
          <mat-icon>logout</mat-icon> Выйти
        </button>
      } @else {
        <button mat-stroked-button class="login-btn" routerLink="/auth/login">
          <mat-icon>login</mat-icon> Войти
        </button>
      }
    </div>
  </mat-toolbar>

  <main class="app-main-content">
    <router-outlet />
  </main>
</div>
